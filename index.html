<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClockOut</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f3; font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 2rem 1rem; }
  .wrap { width: 100%; max-width: 480px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; align-items: stretch; }
  .card { background: #fff; border: 0.5px solid #e0dfd8; border-radius: 12px; padding: 12px 14px; display: flex; flex-direction: column; min-width: 0; }
  .card-full { grid-column: 1 / -1; }
  .card-label { font-size: 11px; color: #888780; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .card-value { font-size: 24px; font-weight: 500; color: #1a1a18; font-variant-numeric: tabular-nums; letter-spacing: -1px; line-height: 1; }
  .hate-btn { width: 100%; margin-top: 8px; padding: 5px 4px; background: #fff0f0; border: 1px solid #f4c0c0; border-radius: 8px; font-size: 10px; color: #c0392b; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; }
  .hate-btn:active { background: #ffe0e0; }
  .hate-btn.pressed { background: #f5f5f5; border-color: #ddd; color: #aaa; cursor: default; }
  .lunch-btn { width: 100%; margin-top: 8px; padding: 5px 4px; background: #f0fff4; border: 1px solid #9ae6b4; border-radius: 8px; font-size: 10px; color: #276749; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; }
  .lunch-btn.done { background: #f5f5f5; border-color: #ddd; color: #aaa; }

  .card-sub-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .card-sub { font-size: 12px; color: #888780; }
  .muted { font-size: 16px; font-weight: 400; color: #888780; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-family: 'Noto Sans KR', sans-serif; }
  .badge-work { background: #E6F1FB; color: #185FA5; }
  .badge-done { background: #EAF3DE; color: #3B6D11; }
  .badge-before { background: #FAEEDA; color: #854F0B; }
  .badge-lunch { background: #f1efea; color: #5F5E5A; border: 0.5px solid #e0dfd8; }
  .blocks-card { background: #fff; border: 0.5px solid #e0dfd8; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .blocks-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .blocks-label { font-size: 11px; color: #888780; display: flex; align-items: center; gap: 5px; }
  .lunch-toggle label { font-size: 11px; color: #888780; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .lunch-toggle input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 12px; height: 12px; border: 1px solid #888780; border-radius: 3px; margin: 0; cursor: pointer; position: relative; flex-shrink: 0; }
  .lunch-toggle input[type="checkbox"]:checked { background: #185FA5; border-color: #185FA5; }
  .lunch-toggle input[type="checkbox"]:checked::after { content: ''; position: absolute; left: 2px; top: 0px; width: 4px; height: 7px; border: 1.5px solid #fff; border-top: none; border-left: none; transform: rotate(45deg); }
  .blocks-wrap { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; }
  .block { border-radius: 5px; height: 24px; }
  .block.done { background: #F4C0D1; border: 1px solid #993556; }
  .block.current { background: #E6F1FB; border: 1px solid #185FA5; }
  .block.remaining { background: #f1efea; border: 1px solid #888780; opacity: 0.4; }
  .block.lunch { background: #D3D1C7; border: 1px solid #444441; }
  .block.lunch.done { background: #B4B2A9; border: 1px solid #2C2C2A; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  .leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #888780; }
  .leg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .dot-done { background: #F4C0D1; border: 1px solid #993556; }
  .dot-current { background: #E6F1FB; border: 1px solid #185FA5; }
  .dot-rem { background: #f1efea; border: 1px solid #888780; opacity: 0.4; }
  .dot-lunch { background: #D3D1C7; border: 1px solid #444441; }
  .settings-card { background: #fff; border: 0.5px solid #e0dfd8; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .settings-label { font-size: 11px; color: #888780; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
  .preset-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .preset-option { position: relative; }
  .preset-option input[type="radio"] { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
  .preset-option label { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 8px 4px; border: 1px solid #e0dfd8; border-radius: 8px; cursor: pointer; font-size: 10.5px; color: #888780; line-height: 1.3; text-align: center; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }
  .preset-option input[type="radio"]:checked + label { border-color: #185FA5; background: #E6F1FB; color: #185FA5; font-weight: 500; }
  .custom-card { background: #fff; border: 0.5px solid #e0dfd8; border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .custom-card label { font-size: 12px; color: #888780; white-space: nowrap; display: flex; align-items: center; gap: 4px; flex-shrink: 0; width: 38px; font-family: 'Noto Sans KR', sans-serif; }
  .custom-card select { flex: 1; min-width: 0; font-size: 12px; color: #888780; border: 0.5px solid #e0dfd8; border-radius: 6px; padding: 4px 8px; background: #f9f9f7; outline: none; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
  .custom-card select:focus { border-color: #185FA5; }
  .chat-card { background: #fff; border: 0.5px solid #e0dfd8; border-radius: 12px; padding: 12px 14px; margin-top: 8px; }
  .chat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 6px; }
  .placard { background: #fffbe6; border: 1px dashed #e0c040; border-radius: 4px; padding: 0 20px; height: 32px; line-height: 32px; font-size: 11.5px; font-weight: 500; color: #5c4500; text-align: center; margin-bottom: 8px; }
  /* 핑크 마퀴 공지 */
  .notice-wrap { background: #fff5f5; border: 1px dashed #fca5a5; border-radius: 4px; height: 32px; overflow: hidden; margin-bottom: 8px; display: none; position: relative; justify-content: center; align-items: center; box-shadow: 0 0 12px rgba(252,165,165,0.6), inset 0 0 12px rgba(252,165,165,0.2), 0 0 24px rgba(252,165,165,0.3); }
  .notice-inner { display: inline-block; white-space: nowrap; font-size: 11.5px; font-weight: 500; color: #7f1d1d; padding: 0 30px; animation: shake 0.8s ease-in-out infinite; }
  .notice-inner span { display: inline-block; vertical-align: middle; }
  .notice-edit-btn { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: none; border: 1px solid #fca5a5; border-radius: 4px; color: #7f1d1d; font-size: 10px; padding: 1px 5px; cursor: pointer; display: none; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-3px)} 40%{transform:translateX(3px)} 60%{transform:translateX(-2px)} 80%{transform:translateX(2px)} }
  .chat-nickname { font-size: 11px; color: #185FA5; background: #E6F1FB; padding: 2px 8px; border-radius: 99px; font-family: 'Noto Sans KR', sans-serif; }
  .chat-messages { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .chat-pagination { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .chat-pagination button { background: none; border: 0.5px solid #e0dfd8; border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #888780; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
  .chat-pagination button:hover { background: #f1efea; }
  .chat-pagination button:disabled { opacity: 0.3; cursor: default; }
  .chat-pagination .page-info { font-size: 11px; color: #888780; }
  .chat-msg { font-size: 12px; background: #f9f9f7; border-radius: 8px; padding: 8px 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .chat-msg.mine { background: #E6F1FB; }
  .chat-msg-body { display: flex; flex-direction: column; width: 100%; gap: 6px; }
  .chat-msg-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
  .chat-msg-nick-group { display: flex; align-items: center; gap: 4px; }
  .chat-msg-bottom { font-size: 12px; line-height: 1.4; color: #1a1a18; word-break: break-all; display: block; }
  .chat-msg .chat-msg-nick { color: #185FA5; font-weight: 500; }
  .chat-msg .chat-msg-time { color: #aaa; font-size: 10px; flex-shrink: 0; }
  .badge-siren-text { display: inline-flex; align-items: center; justify-content: center; background-color: #ffebeb; color: #e74c3c; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 99px; white-space: nowrap; border: 1px solid #f9d5d5; line-height: 1; vertical-align: middle; }
  .chat-empty { font-size: 12px; color: #aaa; text-align: center; padding: 12px 0; }
  .chat-input-row { display: flex; gap: 6px; }
  .chat-input-row input { flex: 1; min-width: 0; font-size: 12px; color: #5F5E5A; border: 0.5px solid #e0dfd8; border-radius: 6px; padding: 6px 10px; background: #f9f9f7; outline: none; font-family: 'Noto Sans KR', sans-serif; }
  .chat-input-row input:focus { border-color: #185FA5; }
  .chat-input-row button { background: #185FA5; color: #fff; border: none; border-radius: 6px; width: 32px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .chat-input-row button:hover { background: #144d87; }
  .chat-refresh-btn { background: none; border: 0.5px solid #e0dfd8; border-radius: 6px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #888780; }
  .chat-refresh-btn:hover { background: #f1efea; }
  .admin-panel { display: flex; align-items: center; gap: 4px; flex-shrink: 0; margin-left: 6px; }
  .admin-btn { background: none; border: 0.5px solid #e0dfd8; border-radius: 6px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; }
  .admin-btn:hover { background: #f1efea; }
  .siren-btn { background: none; border: none; cursor: pointer; font-size: 12px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
  .delete-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 12px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
  .delete-btn:hover { color: #e05a5a; }
</style>
</head>
<body>
<div class="wrap">
  <div class="cards">
    <div class="card">
      <div class="card-label"><i class="ti ti-stack" style="font-size:13px"></i> 진행 세트</div>
      <div style="flex:1; margin-bottom:4px; display:flex; align-items:baseline; gap:2px;"><span class="card-value" id="sets-val">--</span><span class="muted" id="sets-total"></span></div>
      <div class="card-sub-row" style="margin-top:auto;">
        <span class="card-sub">30분 단위</span>
        <span class="badge badge-work" id="badge">로딩 중</span>
      </div>
    </div>
    <div class="card">
      <div class="card-label"><i class="ti ti-clock" style="font-size:13px"></i> 남은 시간</div>
      <div style="flex:1; display:flex; align-items:baseline; gap:6px; flex-wrap:nowrap; margin-bottom:4px;">
        <div class="card-value" id="countdown">--:--:--</div>
        <span class="card-sub" id="now-clock" style="white-space:nowrap;"></span>
      </div>
      <div class="card-sub-row" style="margin-top:auto;">
        <span class="card-sub" id="sublabel">퇴근까지</span>
      </div>
    </div>
    <div class="card">
      <div class="card-label"><i class="ti ti-thumb-down" style="font-size:13px"></i> 일하기 싫은 사람</div>
      <div style="flex:1; margin-bottom:4px; display:flex; align-items:baseline; gap:2px;"><span class="card-value" id="hate-count">--</span><span class="muted" style="font-size:12px;"> 명</span></div>
      <button class="hate-btn" id="hate-btn" style="margin-top:auto;">그건 바로 나 😩</button>
    </div>
    <div class="card">
      <div class="card-label"><i class="ti ti-tools-kitchen-2" style="font-size:13px"></i> 오늘 뭐 먹지?</div>
      <div style="flex:1; margin-bottom:4px; display:flex; align-items:baseline; gap:4px;"><span class="card-value" id="lunch-result">?</span></div>
      <button class="lunch-btn" id="lunch-btn" style="margin-top:auto;">돌려 돌려 😋</button>
    </div>
  </div>

  <div class="blocks-card">
    <div class="blocks-top">
      <span class="blocks-label"><i class="ti ti-layout-grid" style="font-size:13px"></i> 30분 블록</span>
      <div class="lunch-toggle">
        <label><input type="checkbox" id="lunch-alt"> 점심 12:00~13:00</label>
      </div>
    </div>
    <div class="blocks-wrap" id="blocks"></div>
    <div class="legend">
      <div class="leg"><div class="leg-dot dot-done"></div>완료</div>
      <div class="leg"><div class="leg-dot dot-current"></div>진행 중</div>
      <div class="leg"><div class="leg-dot dot-rem"></div>남은 세트</div>
      <div class="leg"><div class="leg-dot dot-lunch"></div>점심</div>
    </div>
  </div>

  <div class="settings-card">
    <div class="settings-label"><i class="ti ti-clock" style="font-size:13px"></i> 근무시간 선택</div>
    <div class="preset-grid" id="preset-grid"></div>
  </div>

  <div class="custom-card">
    <label><i class="ti ti-clock" style="font-size:13px"></i> 출근</label>
    <select id="start-time"></select>
    <label><i class="ti ti-home" style="font-size:13px"></i> 퇴근</label>
    <select id="end-time"></select>
  </div>

  <div class="chat-card">
    <div class="chat-header">
      <span class="settings-label" style="margin:0;"><i class="ti ti-notebook" style="font-size:13px"></i> 방명록</span>
      <div style="display:flex; align-items:center; gap:6px;">
        <span class="chat-nickname" id="my-nickname">익명</span>
        <button id="admin-btn" class="admin-btn" title="관리자">🔑</button>
        <button id="chat-refresh" class="chat-refresh-btn"><i class="ti ti-refresh" style="font-size:13px"></i></button>
      </div>
    </div>
    <div class="placard">📢 심한 욕 쓰면!!! 삭제해버립니다 !!!</div>
    <div class="notice-wrap" id="notice-wrap">
      <div class="notice-inner" id="notice-inner"></div>
      <button class="notice-edit-btn" id="notice-edit-btn">✏️</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-pagination" id="chat-pagination" style="display:none;">
      <button id="page-prev">← 이전</button>
      <span class="page-info" id="page-info"></span>
      <button id="page-next">다음 →</button>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="한마디 남겨보세요" maxlength="200">
      <button id="chat-send"><i class="ti ti-send" style="font-size:14px"></i></button>
    </div>
  </div>
</div>

<script>
const LUNCH_DEFAULT = {start: 11*60+30, end: 13*60};
const LUNCH_ALT     = {start: 12*60,    end: 13*60};
const PRESETS=[
  {start:'08:00', end:'17:00'},{start:'08:30', end:'17:30'},
  {start:'09:00', end:'18:00'},{start:'09:30', end:'18:30'},
  {start:'10:00', end:'19:00'}
];

function getMins(str){const[h,m]=str.split(':').map(Number);return h*60+m;}
function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return[h,m,ss].map(n=>String(n).padStart(2,'0')).join(':');}
function fmtLabel(t){
  const[h,m]=t.split(':').map(Number);
  const ampm=h<12?'오전':'오후';
  const hh=h===0?12:h>12?h-12:h;
  return ampm+' '+hh+':'+String(m).padStart(2,'0');
}

function buildOptions(selectEl, defaultVal){
  for(let t=0;t<24*60;t+=30){
    const h=Math.floor(t/60),m=t%60;
    const val=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
    const opt=document.createElement('option');
    opt.value=val;opt.textContent=fmtLabel(val);
    if(val===defaultVal)opt.selected=true;
    selectEl.appendChild(opt);
  }
}

const startSelect=document.getElementById('start-time');
const endSelect=document.getElementById('end-time');
const savedStart=localStorage.getItem('clockout-start')||'09:00';
const savedEnd=localStorage.getItem('clockout-end')||'18:00';
buildOptions(startSelect,savedStart);
buildOptions(endSelect,savedEnd);

const lunchAltEl=document.getElementById('lunch-alt');
lunchAltEl.checked=localStorage.getItem('clockout-lunch-alt')==='true';
lunchAltEl.addEventListener('change',()=>{
  localStorage.setItem('clockout-lunch-alt',lunchAltEl.checked);tick();
});

const presetGrid=document.getElementById('preset-grid');
function findMatchingPresetIdx(s,e){return PRESETS.findIndex(p=>p.start===s&&p.end===e);}
let selectedIdx=findMatchingPresetIdx(savedStart,savedEnd);
PRESETS.forEach((p,i)=>{
  const wrap=document.createElement('div');wrap.className='preset-option';
  const id='preset-'+i;
  const input=document.createElement('input');
  input.type='radio';input.name='preset';input.id=id;input.value=i;
  if(i===selectedIdx)input.checked=true;
  const label=document.createElement('label');
  label.setAttribute('for',id);
  label.innerHTML=fmtLabel(p.start)+'<br>~ '+fmtLabel(p.end);
  wrap.appendChild(input);wrap.appendChild(label);presetGrid.appendChild(wrap);
  input.addEventListener('change',()=>{startSelect.value=p.start;endSelect.value=p.end;saveAndTick();});
});

function uncheckPresets(){document.querySelectorAll('input[name="preset"]').forEach(r=>r.checked=false);}
function syncPresetCheck(){
  const idx=findMatchingPresetIdx(startSelect.value,endSelect.value);
  uncheckPresets();
  if(idx!==-1){const t=document.getElementById('preset-'+idx);if(t)t.checked=true;}
}
function saveAndTick(){
  localStorage.setItem('clockout-start',startSelect.value);
  localStorage.setItem('clockout-end',endSelect.value);
  syncPresetCheck();tick();
}
startSelect.addEventListener('change',saveAndTick);
endSelect.addEventListener('change',saveAndTick);

function tick(){
  const now=new Date();
  const nowMins=now.getHours()*60+now.getMinutes();
  const nowSecs=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
  const nowClockEl=document.getElementById('now-clock');
  const curH=now.getHours();
  const curAmPm=curH<12?'오전':'오후';
  const curHH=curH===0?12:curH>12?curH-12:curH;
  nowClockEl.textContent='('+curAmPm+' '+curHH+':'+String(now.getMinutes()).padStart(2,'0')+')';
  const lunch=lunchAltEl.checked?LUNCH_ALT:LUNCH_DEFAULT;
  const LUNCH_START_MINS=lunch.start,LUNCH_END_MINS=lunch.end;
  const startMins=getMins(startSelect.value),endMins=getMins(endSelect.value);
  const startSecs=startMins*60,endSecs=endMins*60;
  const blocks=[];
  for(let t=startMins;t<endMins;t+=30)blocks.push({start:t,end:Math.min(t+30,endMins)});
  const blocksEl=document.getElementById('blocks');
  blocksEl.innerHTML='';
  let completed=0,total=0;
  blocks.forEach(b=>{
    const div=document.createElement('div');
    const mid=(b.start+b.end)/2;
    const isLunch=mid>=LUNCH_START_MINS&&mid<=LUNCH_END_MINS;
    if(!isLunch)total++;
    if(isLunch){div.className=nowMins>=b.end?'block lunch done':'block lunch';}
    else if(nowMins>=b.end){div.className='block done';completed++;}
    else if(nowMins>=b.start&&nowMins<b.end){div.className='block current';}
    else{div.className='block remaining';}
    blocksEl.appendChild(div);
  });
  const isLunch=nowMins>=LUNCH_START_MINS&&nowMins<LUNCH_END_MINS;
  const cdEl=document.getElementById('countdown');
  const badge=document.getElementById('badge');
  const sub=document.getElementById('sublabel');
  const setsVal=document.getElementById('sets-val');
  const setsTotal=document.getElementById('sets-total');
  setsTotal.textContent=' / '+total;
  if(nowMins<startMins){
    cdEl.textContent=fmt(Math.max(0,startSecs-nowSecs));
    badge.className='badge badge-before';badge.textContent='출근 전';
    sub.textContent='출근까지';setsVal.childNodes[0].textContent='--';setsTotal.textContent='';
  }else if(nowSecs>=endSecs){
    cdEl.textContent='퇴근!';
    badge.className='badge badge-done';badge.textContent='완료';
    sub.textContent='수고하셨습니다';setsVal.childNodes[0].textContent=total;
  }else if(isLunch){
    cdEl.textContent=fmt(Math.max(0,endSecs-nowSecs));
    badge.className='badge badge-lunch';badge.textContent='점심시간';
    sub.textContent='퇴근까지';setsVal.childNodes[0].textContent=completed;
  }else{
    cdEl.textContent=fmt(Math.max(0,endSecs-nowSecs));
    badge.className='badge badge-work';badge.textContent='근무 중';
    sub.textContent='퇴근까지';setsVal.childNodes[0].textContent=completed;
  }
}

function buildMarquee(text){
  noticeInner.innerHTML='';
  const chars=[...('📣 '+text)];
  let delay=0;
  chars.forEach(ch=>{
    const span=document.createElement('span');
    span.textContent=ch===' '?'\u00A0':ch;
    span.style.animationDelay=delay+'s';
    noticeInner.appendChild(span);
    if(ch!==' ')delay+=0.07;
  });
}

// --- 익명 방명록 ---
const ANIMAL_EMOJI={
  "돼지":"🐷","다람쥐":"🐿️","펭귄":"🐧","햄스터":"🐹",
  "여우":"🦊","고래":"🐳","토끼":"🐰","부엉이":"🦉",
  "거북이":"🐢","수달":"🦦","코알라":"🐨","사자":"🦁",
  "너구리":"🦝","오리":"🦆","곰":"🐻","강아지":"🐶",
  "물개":"🦭","기린":"🦒","판다":"🐼","라마":"🦙"
};

function addEmojiToNickname(nickname){
  if(!nickname)return nickname;
  const firstChar=nickname.codePointAt(0);
  if(firstChar>0x1F000)return nickname;
  for(const noun in ANIMAL_EMOJI){
    if(nickname.includes(noun))return ANIMAL_EMOJI[noun]+' '+nickname;
  }
  return nickname;
}

let myNickname=localStorage.getItem('clockout-nickname');
if(myNickname){
  const withEmoji=addEmojiToNickname(myNickname);
  if(withEmoji!==myNickname){myNickname=withEmoji;localStorage.setItem('clockout-nickname',myNickname);}
}

async function ensureNickname(){
  if(!myNickname){
    try{
      const res=await fetch('/api/nickname');
      const data=await res.json();
      myNickname=data.nickname;
      localStorage.setItem('clockout-nickname',myNickname);
    }catch(e){myNickname='익명';}
  }
  document.getElementById('my-nickname').textContent=myNickname;
}

function fmtChatTime(ts){
  const d=new Date(ts*1000);
  const year=String(d.getFullYear()).slice(-2);
  const month=String(d.getMonth()+1).padStart(2,'0');
  const date=String(d.getDate()).padStart(2,'0');
  const h=d.getHours();
  const ampm=h<12?'오전':'오후';
  const hh=h===0?12:h>12?h-12:h;
  return year+'-'+month+'-'+date+' '+ampm+' '+hh+':'+String(d.getMinutes()).padStart(2,'0');
}

const chatMessagesEl=document.getElementById('chat-messages');
const paginationEl=document.getElementById('chat-pagination');
const pageInfoEl=document.getElementById('page-info');
const pagePrevEl=document.getElementById('page-prev');
const pageNextEl=document.getElementById('page-next');
const PAGE_SIZE=10;
let allMessages=[],currentPage=0,isAdmin=false,adminPassword='';

function escapeHtml(str){
  const div=document.createElement('div');div.textContent=str;return div.innerHTML;
}

function renderPage(){
  const total=allMessages.length;
  const totalPages=Math.ceil(total/PAGE_SIZE);
  const start=currentPage*PAGE_SIZE;
  const pageItems=allMessages.slice(start,start+PAGE_SIZE);
  if(total===0){
    chatMessagesEl.innerHTML='<div class="chat-empty">아직 방명록이 비어있어요. 첫 글을 남겨보세요!</div>';
    paginationEl.style.display='none';return;
  }
  chatMessagesEl.innerHTML='';
  pageItems.forEach(m=>{
    const displayNick=addEmojiToNickname(m.nickname);
    const mine=displayNick===myNickname;
    const div=document.createElement('div');
    div.className='chat-msg'+(mine?' mine':'');
    const body=document.createElement('div');
    body.className='chat-msg-body';
    const sirenHtml=m.has_siren?`<span class="badge-siren-text">🚨경고</span>`:'';
    body.innerHTML=`
      <div class="chat-msg-top">
        <div class="chat-msg-nick-group">
          <span class="chat-msg-nick">${escapeHtml(displayNick)}</span>${sirenHtml}
        </div>
        <span class="chat-msg-time">${fmtChatTime(m.ts)}</span>
      </div>
      <div class="chat-msg-bottom"><span>${escapeHtml(m.text)}</span></div>
    `;
    div.appendChild(body);
    if(isAdmin){
      const adminPanel=document.createElement('div');
      adminPanel.className='admin-panel';
      if(!m.has_siren){
        const sirenBtn=document.createElement('button');
        sirenBtn.className='siren-btn';sirenBtn.textContent='🚨';
        sirenBtn.addEventListener('click',()=>setSiren(m.id));
        adminPanel.appendChild(sirenBtn);
      }
      const delBtn=document.createElement('button');
      delBtn.className='delete-btn';delBtn.textContent='🗑️';
      delBtn.addEventListener('click',()=>deleteMsg(m.id));
      adminPanel.appendChild(delBtn);
      div.appendChild(adminPanel);
    }
    chatMessagesEl.appendChild(div);
  });
  paginationEl.style.display=totalPages>1?'flex':'none';
  pageInfoEl.textContent=(currentPage+1)+' / '+totalPages;
  pagePrevEl.disabled=currentPage===0;
  pageNextEl.disabled=currentPage>=totalPages-1;
}

async function setSiren(id){
  if(!confirm('이 댓글에 🚨 경고 뱃지를 부여할까요?'))return;
  try{
    const res=await fetch('/api/guestbook/'+id+'/siren',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:adminPassword})
    });
    if(res.ok)loadGuestbook();else alert('경고 처리 실패');
  }catch(e){alert('오류 발생');}
}

async function deleteMsg(id){
  if(!confirm('이 댓글을 삭제할까요?'))return;
  try{
    const res=await fetch('/api/guestbook/'+id,{
      method:'DELETE',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:adminPassword})
    });
    if(res.ok)loadGuestbook();else alert('삭제 실패');
  }catch(e){alert('오류 발생');}
}

document.getElementById('admin-btn').addEventListener('click',()=>{
  if(isAdmin){
    isAdmin=false;adminPassword='';
    document.getElementById('admin-btn').textContent='🔑';
    noticeEditBtn.style.display='none';
    if(!noticeInner.textContent.trim()) noticeWrap.style.display='none';
    renderPage();return;
  }
  const pw=prompt('관리자 비밀번호를 입력하세요:');
  if(pw===null)return;
  adminPassword=pw;isAdmin=true;
  document.getElementById('admin-btn').textContent='🔓';
  noticeWrap.style.display='flex';
  noticeEditBtn.style.display='block';
  renderPage();
});

pagePrevEl.addEventListener('click',()=>{if(currentPage>0){currentPage--;renderPage();}});
pageNextEl.addEventListener('click',()=>{currentPage++;renderPage();});

async function loadGuestbook(){
  chatMessagesEl.innerHTML='<div class="chat-empty">불러오는 중...</div>';
  try{
    const res=await fetch('/api/guestbook');
    const data=await res.json();
    allMessages=data.messages||[];currentPage=0;renderPage();
  }catch(e){
    chatMessagesEl.innerHTML='<div class="chat-empty">불러오기 실패. 새로고침 버튼을 눌러주세요.</div>';
  }
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  try{
    await fetch('/api/guestbook',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({nickname:myNickname,text})
    });
    loadGuestbook();
  }catch(e){input.value=text;}
}

let sending=false;
async function safeSendChat(){
  if(sending)return;sending=true;await sendChat();sending=false;
}

document.getElementById('chat-send').addEventListener('click',safeSendChat);
document.getElementById('chat-input').addEventListener('keydown',(e)=>{
  if(e.key==='Enter'){e.preventDefault();safeSendChat();}
